name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'providers.csv'
      - 'collections.csv'
      - 'build.py'
      - 'index.html'
      - 'main.css'
      - '*.pdf'
      - 'metadata-docs/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: python build.py

      - name: Push artifacts to build branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Collect only the files needed for the site
          mkdir -p _site
          cp index.html main.css _site/
          cp *.pdf _site/ 2>/dev/null || true
          cp -r metadata-docs _site/

          # Force-push the site contents to the build branch
          cd _site
          git init
          git checkout -b build
          git add .
          git commit -m "Build from ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4
        with:
          ref: build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
